name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
  JWT_SIGNING_KEY: ci-test-jwt-key-not-for-production
  DEBUG: "false"

jobs:
  test-sqlite:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migrate
        run: python manage.py migrate --noinput

      - name: Django system check
        run: python manage.py check

      - name: Run tests
        run: python manage.py test --verbosity=2

  test-postgres:
    name: Tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: insighta
          POSTGRES_PASSWORD: insighta
          POSTGRES_DB: insighta_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U insighta"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://insighta:insighta@localhost:5432/insighta_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migrate
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test --verbosity=2
